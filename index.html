<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Grocery List</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .list-section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .category-header {
            color: #1a73e8;
            font-size: 1.1em;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #f0f4f8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        
        .item-list input[type="checkbox"] {
            margin-right: 15px; 
            transform: scale(1.4); 
            cursor: pointer;
        }

        /* Readable Check: Blue & Bold when selected */
        .item-list input[type="checkbox"]:checked + span {
            color: #1a73e8;
            font-weight: 600;
        }

        .item-list span {
            font-size: 1.2em;
        }

        .custom-item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .custom-item-row input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
        }

        .custom-item-row input[type="text"]:focus {
            border-color: #1a73e8;
        }
        
        .remove-btn {
            padding: 10px 15px;
            background-color: #ffeded;
            color: #dc3545;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .add-item-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .clear-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background-color: transparent;
            color: #888;
            border: 2px dashed #ccc;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>

    </div>

    <button class="clear-btn" onclick="clearList()">🔄 Reset List for Next Trip</button>
</div>
