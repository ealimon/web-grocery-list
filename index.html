<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Grocery List</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .list-section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .category-header {
            color: #1a73e8;
            font-size: 1.1em;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #f0f4f8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        
        .item-list input[type="checkbox"] {
            margin-right: 15px; 
            transform: scale(1.4); 
            cursor: pointer;
        }

        /* Readable Check: Blue & Bold when selected */
        .item-list input[type="checkbox"]:checked + span {
            color: #1a73e8;
            font-weight: 600;
        }

        .item-list span {
            font-size: 1.2em;
        }

        .custom-item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .custom-item-row input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
        }

        .custom-item-row input[type="text"]:focus {
            border-color: #1a73e8;
        }
        
        .remove-btn {
            padding: 10px 15px;
            background-color: #ffeded;
            color: #dc3545;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .add-item-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .clear-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background-color: transparent;
            color: #888;
            border: 2px dashed #ccc;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 My Grocery List</h1> 

    <div class="list-section">
        <div id="popular-items-list"></div>
    </div>

    <div class="list-section">
        <h2 style="font-size: 1.2em; margin-top: 0;">➕ Add Extra Items</h2>
        <div id="custom-items-container"></div>
        <button class="add-item-btn" onclick="addCustomItem()">Add Custom Item</button>
    </div>

    <button class="clear-btn" onclick="clearList()">🔄 Reset List for Next Trip</button>
</div>

<script>
    // 💡 THE FULL RESTORED LIST
    const POPULAR_ITEMS = [
        { name: "Apples", category: "Produce" },
        { name: "Bananas 🍌", category: "Produce" },
        { name: "Blueberries", category: "Produce" },
        { name: "Limes/Lemons", category: "Produce" },
        { name: "Onions", category: "Produce" },
        { name: "Potatoes", category: "Produce" },
        { name: "Tomatoes", category: "Produce" },
        { name: "Oranges", category: "Produce" },
        { name: "Butter", category: "Dairy/Refrigerated" },
        { name: "Cheese", category: "Dairy/Refrigerated" },
        { name: "Eggs 🥚", category: "Dairy/Refrigerated" },
        { name: "Milk 🥛", category: "Dairy/Refrigerated" },
        { name: "Yogurt", category: "Dairy/Refrigerated" },
        { name: "Chicken Breast", category: "Meat" },
        { name: "Ground Beef", category: "Meat" },
        { name: "Steak 🥩", category: "Meat" },
        { name: "Bread 🍞", category: "Bakery/Cereal" },
        { name: "Cereal", category: "Bakery/Cereal" },
        { name: "Coffee ☕", category: "Pantry" },
        { name: "Pasta", category: "Pantry" },
        { name: "Rice", category: "Pantry" },
        { name: "Salt", category: "Pantry" },
        { name: "Sugar", category: "Pantry" },
        { name: "Dish Soap", category: "Household" },
        { name: "Garbage Bags", category: "Household" },
        { name: "Paper Towels", category: "Household" },
        { name: "Toilet Paper", category: "Household" }
    ];

    const popularListContainer = document.getElementById('popular-items-list');
    const customContainer = document.getElementById('custom-items-container');

    document.addEventListener('DOMContentLoaded', () => {
        renderPopularItems();
        loadCustomItems();
        attachEventListeners();
    });

    const cleanName = (s) => s.replace(/[\uD800-\uDBFF\uDC00-\uDFFF\u2600-\u26FF\u2700-\u27BF]/g, '').trim();

    function renderPopularItems() {
        popularListContainer.innerHTML = '';
        const savedChecks = JSON.parse(localStorage.getItem('popularChecks')) || {};
        const categorizedItems = POPULAR_ITEMS.reduce((acc, item) => {
            acc[item.category] = acc[item.category] || [];
            acc[item.category].push(item);
            return acc;
        }, {});

        Object.keys(categorizedItems).sort().forEach(category => {
            const header = document.createElement('div');
            header.className = 'category-header';
            header.textContent = category;
            popularListContainer.appendChild(header);

            const ul = document.createElement('ul');
            ul.className = 'item-list';

            // Sorting A-Z within the category
            categorizedItems[category].sort((a, b) => cleanName(a.name).localeCompare(cleanName(b.name)));

            categorizedItems[category].forEach(item => {
                const itemCleanName = cleanName(item.name);
                const isChecked = savedChecks[itemCleanName] ? 'checked' : '';
                const li = document.createElement('li');
                li.innerHTML = `
                    <label style="display: flex; align-items: center; width: 100%;">
                        <input type="checkbox" value="${itemCleanName}" ${isChecked}>
                        <span>${item.name}</span>
                    </label>`;
                ul.appendChild(li);
            });
            popularListContainer.appendChild(ul);
        });
    }
    
    function loadCustomItems() {
        const savedCustom = JSON.parse(localStorage.getItem('customItems')) || []; 
        customContainer.innerHTML = '';
        savedCustom.forEach(value => addCustomItem(value, false));
    }
    
    function attachEventListeners() {
        popularListContainer.addEventListener('change', (e) => {
            if (e.target.type === 'checkbox') savePopularItems();
        });
        customContainer.addEventListener('input', saveCustomItems);
    }
    
    function savePopularItems() {
        const checks = {};
        popularListContainer.querySelectorAll('input[type="checkbox"]').forEach(c => checks[c.value] = c.checked);
        localStorage.setItem('popularChecks', JSON.stringify(checks));
    }
    
    function saveCustomItems() {
        const items = Array.from(customContainer.querySelectorAll('input[type="text"]')).map(i => i.value.trim());
        localStorage.setItem('customItems', JSON.stringify(items));
    }

    function addCustomItem(value = '', autofocus = true) {
        const row = document.createElement('div');
        row.className = 'custom-item-row';
        const input = document.createElement('input');
        input.type = 'text';
        input.value = value;
        input.placeholder = "Item name...";
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '✕';
        removeBtn.onclick = () => { row.remove(); saveCustomItems(); };
        row.appendChild(input);
        row.appendChild(removeBtn);
        customContainer.appendChild(row);
        if (autofocus) input.focus();
    }
    
    function clearList() {
        if (!confirm("Clear current selections and custom items?")) return;
        localStorage.removeItem('popularChecks');
        localStorage.removeItem('customItems');
        location.reload();
    }
</script>

</body>
</html>
